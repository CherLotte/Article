# =========================================================================
# 多 Agent 自动小说创作流水线 - 主配置文件
# 三层博弈对抗架构(参考方案三原文 5.2 节)
# =========================================================================

project:
  name: artil-novel-pipeline
  output_dir: ./data
  log_level: INFO

# -----------------------------------------------------------------------------
# LLM 配置
#   provider: mock | openai   (mock 无需 API key，方便离线调试)
# -----------------------------------------------------------------------------
llm:
  provider: mock
  model: gpt-4o-mini
  temperature: 0.8
  max_tokens: 2048
  timeout: 60

# -----------------------------------------------------------------------------
# 小说基本设定
# -----------------------------------------------------------------------------
novel:
  title: 凤临九霄
  subtitle: 女帝本纪
  genre: 古风权谋
  target_chapters: 5
  words_per_chapter: 1500
  style: 沉稳大气、权谋与热血交织,对话精炼,画面感强,人物弧线丰满
  idea: |
    亡国公主萧清晏蛰伏深宫五年,与谋臣谢临渊隔空对弈。
    她从被构陷流放西南,到起兵北上、登基为帝,
    开永安盛世,与谢临渊达成千古无双的君臣制衡。

# -----------------------------------------------------------------------------
# 流水线参数
# -----------------------------------------------------------------------------
pipeline:
  # 单章最大迭代次数(刚性校验 / 柔性评审失败时循环触发,3 次后强制进入人工复核)
  max_iterations_per_chapter: 3

  # 评分分档阈值(柔性评审)
  score_finalize: 8.0   # >= 该值 → 直接定稿
  score_local: 6.0      # >= 该值且 < finalize → 局部优化迭代
                         # < 该值 → 重建创意+正文

  # =============================================================================
  # 用户后台资料驱动模式（推荐开启）
  #   - 用户只需在 background/ 下提交 5 份资料, 流水线优先采用
  #   - 缺失字段再回退 LLM, 行为完全兼容无 background 文件时的纯 LLM 模式
  # =============================================================================
  use_background: true
  background_dir: ./background
