        "“陛下也从未变过。”谢临渊语气沉静，字字通透，直击核心，“你借臣之力定乱世、理朝局，却时刻制衡、步步设防，防臣功高震主，防臣权倾朝野。君臣制衡，本就是帝王权术，臣从未小觑。”",
        "这便是二人最极致的君臣羁绊。",
        "萧清晏手握兵权、民心、皇权，掌天下生杀大权，是定乾坤的君；谢临渊手握朝堂吏治、暗谍情报、文官集团，掌朝野运转之权，是镇朝堂的臣。",
        "她需要他梳理乱世残局、规整朝堂、制衡世家，无人能替代；他需要她的帝王魄力、铁血手段、绝对权威，方能推行新政、安定万民。",
        "彼此依存，亦彼此制衡；彼此信任，亦彼此提防。",
        "萧清晏缓步走到殿中炉旁，龙袍锦纹在灯火下明暗交错，她垂眸沉吟片刻，随即抬眼，语气笃定而威严，定下不可逾越的君臣底线：“朕认你的忠心，亦惜你的才干。但皇权独尊，朝堂有界。太傅掌吏治、理百官、镇朝野，朕尽可放权。可若私蓄势力、暗弄权谋、凌驾君权，乱朕山河根基，朕绝不姑息。”",
        "此言是告诫，是底线，更是帝王最后的制衡。",
        "谢临渊身形微伏，长揖到底，声线铿锵有力，掷地有声，既是立誓，亦是双向制衡的回应：“臣毕生权谋，只为肃朝纲、安万民、辅明君。此生绝不私权结党、不越君臣雷池。臣信陛下容人之量，亦望陛下信臣毕生初心。”",
        "他甘愿臣服，却从不卑微；她全然信任，却绝不纵容。",
        "晚风入殿，拂动二人衣袂。昔日深宫隔空对弈、绝境暗中相守、乱世南北合势的对手与知己，终在盛世朝堂，达成了最稳固的君臣制衡。",
        "往后永安盛世，女帝掌乾坤、定杀伐，太傅理朝堂、镇诡谲。一君一臣，一武一文，一刚一柔，彼此拉扯、彼此成就，制衡而不乱，共治而不争。",
        "世间最好的君臣，从不是一味顺从、全然依附，而是旗鼓相当、互相制衡，以毕生权谋与初心，共守万里锦绣山河，终成千古无双的君臣绝唱。"
      ]
    }
  ];

  // Elements
  const titleEl = document.getElementById('chapter-title');
  const contentEl = document.getElementById('chapter-content');
  const selectEl = document.getElementById('chapter-select');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const firstBtn = document.getElementById('first-btn');
  const lastBtn = document.getElementById('last-btn');
  const pageIndicator = document.getElementById('page-indicator');
  const progressEl = document.getElementById('progress');

  let currentIndex = 0;

  // Populate chapter selector
  chapters.forEach((ch, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = (i + 1) + '. ' + ch.title;
    selectEl.appendChild(opt);
  });

  function render(idx) {
    const ch = chapters[idx];
    titleEl.textContent = ch.title;
    contentEl.innerHTML = ch.paragraphs.map(p => '<p>' + p + '</p>').join('');
    pageIndicator.textContent = '第 ' + (idx + 1) + ' 卷 / 共 ' + chapters.length + ' 卷';
    progressEl.textContent = '阅读进度 ▸ ' + (idx + 1) + ' / ' + chapters.length
      + '  (' + Math.round((idx + 1) / chapters.length * 100) + '%)';
    selectEl.value = idx;
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === chapters.length - 1);
    firstBtn.disabled = (idx === 0);
    lastBtn.disabled = (idx === chapters.length - 1);

    // Scroll to top of book
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goto(idx) {
    if (idx < 0 || idx >= chapters.length) return;
    currentIndex = idx;
    render(currentIndex);
  }

  // Wire up controls
  prevBtn.addEventListener('click', () => goto(currentIndex - 1));
  nextBtn.addEventListener('click', () => goto(currentIndex + 1));
  firstBtn.addEventListener('click', () => goto(0));
  lastBtn.addEventListener('click', () => goto(chapters.length - 1));
  selectEl.addEventListener('change', e => goto(parseInt(e.target.value, 10)));

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.target === selectEl) return;
    if (e.key === 'ArrowLeft')  goto(currentIndex - 1);
    if (e.key === 'ArrowRight') goto(currentIndex + 1);
    if (e.key === 'Home')       goto(0);
    if (e.key === 'End')        goto(chapters.length - 1);
  });

  // Initial render
  render(currentIndex);
</script>
</body>
</html>
